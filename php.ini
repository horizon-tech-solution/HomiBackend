; php.ini — place in your project root and start PHP dev server with:
;   php -S localhost:8388 -c php.ini index.php
;
; These settings allow large photo uploads (up to 50 MB per request).

upload_max_filesize = 15M
post_max_size       = 50M
memory_limit        = 128M
max_execution_time  = 60
max_input_time      = 60